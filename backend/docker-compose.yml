version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guitar-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://guitar:guitar@postgres:5432/guitar
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/storage
      - DEBUG=true
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
    networks:
      - guitar-net

  postgres:
    image: postgres:15-alpine
    container_name: guitar-postgres
    environment:
      POSTGRES_USER: guitar
      POSTGRES_PASSWORD: guitar
      POSTGRES_DB: guitar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - guitar-net

  redis:
    image: redis:7-alpine
    container_name: guitar-redis
    ports:
      - "6379:6379"
    networks:
      - guitar-net

  minio:
    image: minio/minio:latest
    container_name: guitar-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - guitar-net

volumes:
  postgres-data:
  minio-data:

networks:
  guitar-net:
    driver: bridge
