name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build production assets
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "fastapi>=0.111,<1" \
            "pydantic>=2.7,<3" \
            "pydantic-settings>=2.3,<3" \
            "sqlalchemy>=2.0.30,<3" \
            "python-multipart>=0.0.9,<1" \
            "python-dotenv>=1.0,<2" \
            "minio>=7.2.7,<8" \
            "httpx>=0.27,<1" \
            "pytest>=8.2,<9"

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests -q

      - name: Compile backend Python sources
        run: python -m compileall -q backend/app backend/alembic backend/scripts
