<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <title>吉他 AI 跟弹 - 我的主页</title>
  <link rel="stylesheet" href="/src/assets/css/reset.css">
  <link rel="stylesheet" href="/src/assets/css/variables.css">
  <link rel="stylesheet" href="/src/assets/css/base.css">
  <link rel="stylesheet" href="/src/assets/css/mobile.css" media="(max-width: 767.98px)">
  <link rel="stylesheet" href="/src/assets/css/desktop.css" media="(min-width: 768px)">
  <link rel="stylesheet" href="/src/assets/css/main.css">
  <link rel="stylesheet" href="/src/assets/css/home.css">
</head>
<body>
  <div id="app" class="app home-app">
    <header class="home-header">
      <div class="header-left">
        <h1 class="home-title">吉他 AI 跟弹</h1>
        <span class="home-subtitle">我的主页</span>
      </div>
      <div class="home-controls">
        <a href="/index.html" class="btn btn-ghost">执行页</a>
        <button class="btn btn-primary" id="uploadBtn">上传视频</button>
      </div>
    </header>

    <main class="home-main">
      <section class="upload-section" id="uploadSection">
        <div class="upload-card">
          <div class="upload-icon">🎸</div>
          <h2 class="upload-title">上传吉他视频，开始 AI 跟弹</h2>
          <p class="upload-desc">支持 MP4 / MOV 格式，建议 30 秒至 10 分钟</p>

          <div class="upload-dropzone" id="dropzone">
            <input type="file" id="fileInput" accept="video/mp4,video/quicktime" hidden>
            <div class="dropzone-content">
              <div class="dropzone-icon">📁</div>
              <p>拖拽视频到此处，或 <span class="text-link">点击选择</span></p>
              <p class="dropzone-hint">也可以粘贴视频链接自动抓取</p>
            </div>
          </div>

          <div class="url-input-group">
            <input type="text" id="urlInput" class="url-input" placeholder="粘贴 Bilibili / YouTube 视频链接">
            <button class="btn btn-primary" id="fetchUrlBtn">抓取</button>
          </div>

          <div class="demo-section">
            <p class="demo-label">或选择演示视频</p>
            <div class="demo-list" id="demoList">
              <div class="demo-card" data-demo="demo1">
                <div class="demo-thumb">▶</div>
                <div class="demo-info">
                  <h3>入门练习曲</h3>
                  <p>45 秒 · C/G/Am/Em</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="courses-section">
        <div class="courses-header">
          <h2 class="section-title">我的课程</h2>
          <span class="course-count" id="courseCount">0 个课程</span>
        </div>
        <div class="courses-grid" id="coursesGrid">
          <!-- 课程卡片由 JS 动态生成 -->
        </div>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🎵</div>
          <p>还没有课程</p>
          <p class="empty-hint">上传一个视频开始你的第一堂课</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/home.js"></script>
</body>
</html>
